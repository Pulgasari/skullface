<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset="UTF-8">
  <meta name='viewport' content="width=device-width, initial-scale=1.0" />
  <title>skullface</title>
  <style>
    @import url("https://cdn.ratcode.dev/css/reset.css");
    @import url("https://cdn.ratcode.dev/css/default.css");

    :root { --bg: white; --fg: black; }
        * { font-family: "Hubot Sans"; line-height: 1; }

    a { color: currentcolor; }
    
    html, body { font-size: 14px; }
    
    body  { z-index: 1; }
    #logo { z-index: 2; }
    
    body {
      background-color: var(--bg);
      color: var(--fg);
      padding: 1rem;
      display: flex;
      flex-flow: column nowrap;
      align-items: center;
      justify-content: space-between;
      transition: background-color 0.25s, color 0.25s;
      background-color: #ffffff;
      background-image: url("data:image/svg+xml,%3Csvg width='52' height='26' viewBox='0 0 52 26' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.05'%3E%3Cpath d='M10 10c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6h2c0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4v2c-3.314 0-6-2.686-6-6 0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6zm25.464-1.95l8.486 8.486-1.414 1.414-8.486-8.486 1.414-1.414z' /%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    
    header { align-self: center; font-weight: 700; }
    footer { align-self: center; letter-spacing: 2px; }
    
    header, footer {
       display: flex;
       align-items: center;
       justify-content: space-between;
       text-transform: uppercase;
    }
    nav {
       display: flex;
       gap: 1.25rem;
    }
    #welcome {
       padding: 2rem;
    }
    #logo {
       display: flex;
       flex-flow: column nowrap;
       align-items: center;
       justify-content: center;
       gap: 1rem;
       max-width: 480px;
       
       .name { font-size: 5rem; font-weight: 900; }
       .sub  { font-size: 1rem; font-style: italic; opacity: 0.50; display: none; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hubot+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>

<body class='mobilefix'>

  <header>
    <nav>
      <a href='#'>About</a>
      <a href='#'>Docs</a>
      <a href='#'>Examples</a>
      <a href='https://github.com/pulgasari/skullface/'>@GitHub</a>
    </nav>
  </header>
  
  <div id='welcome'>
    <div id='logo'>
      <img src='./logo.svg' alt='Logo' />
    </div>
  </div>

  <footer>
    <div>
      ...
    </div>
  </footer>
  
</body>
</html>
